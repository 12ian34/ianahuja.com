content:
  - type: collection
    label: "words"
    name: "words"
    path: "content/words"
    filename: "{primary}.md"
    exclude: [_index.md]
    view:
      fields: [title, date, draft]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - { label: "Title", name: "title", type: "string", required: true }
      - { label: "Publish date", name: "date", type: "date", required: true }
      - { label: "Description", name: "description", type: "string", description: "Short summary for the listing page and social previews.", options: { maxlength: 200 } }
      - { label: "Keywords", name: "keywords", type: "string", description: "Comma-separated keywords for SEO." }
      - { label: "Draft", name: "draft", type: "boolean", default: false }
      - { label: "OG image", name: "og_image", type: "image", description: "Optional social preview image (1200x630)." }
      - { label: "Body", name: "body", type: "rich-text" }
  - type: collection
    label: "supper clubs"
    name: "supperclubs"
    path: "content/supperclubs"
    fields:
      - { label: "Title", name: "title", type: "string" }
      - { label: "Publish date", name: "date", type: "date" }
      - { label: "Event type", name: "eventtype", type: "select" }
      - { label: "Description", name: "description", type: "string" }
      - { label: "Active", name: "active", type: "boolean" }
      - { label: "Tags", name: "tags", type: "select"}
      - { label: "Body", name: "body", type: "rich-text" }
  - type: collection
    label: "recipes"
    name: "recipes"
    path: "content/recipes"
    filename: "{fields.title}"
    fields:
      - { label: "Title", name: "title", type: "string", required: true }
      - { label: "Created", name: "created", type: "date" }
      - { label: "Modified", name: "modified", type: "date" }
      - { label: "Source", name: "source", type: "string" }
      - { label: "Image", name: "image", type: "image" }
      - { label: "Cuisine", name: "cuisine", type: "string" }
      - { label: "Diet", name: "diet", type: "string" }
      - { label: "Prep (mins)", name: "prep", type: "number" }
      - { label: "Body", name: "body", type: "rich-text" }
media:
  input: "static/images"
  output: "/images"